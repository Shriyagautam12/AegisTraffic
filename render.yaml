services:
  - type: web
    name: aegistraffic
    env: python
    region: singapore      
    plan: free
    buildCommand: >
      cd frontend && npm install && npm run build && cd .. &&
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: aegistraffic-learning-db
      mountPath: /data
      sizeGB: 1
